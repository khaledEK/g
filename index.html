<!DOCTYPYE html>


<html>

  <head>

    <title> Kobiax Gallery</title>
    
   <meta charset="UTF-8">

   <meta name="viewport" content="width=device-width, initial-scale=1">

   <link rel="icon" type="image/png" href="favicon-196x196.png" sizes="196x196" />

  </head>
    
    
  <style>
  
  
  .btns_1920{

    margin-top: 13.7%;  margin-left: 15.6%; 
  }
   
  .btns_1366{

    margin-top: 15%; margin-left: 2.6%; 
  }

  .btns{

    font-family: Arial; background-color: transparent; background-size: 90%; background-repeat: no-repeat; background-position: center; border: none; color: transparent;
  }

  .txts{

    font-family: Arial; font-size: 180%; color: grey; background-color: transparent; background-size: 90%; text-align: center;  border: none; color: transparent; 
  }



  </style>



  <body style="background-color: black">
   
    
  
        <section id = "btns" class = "btns_1920">


        <button  onmouseover="select(1)" onmouseout="deselect(1)" id="bt1" onclick="location.href = '3d.html';" class = "btns" style=" font-size: 1500%; margin-left: 4%; background-image: url(3d.png)" > llll </button>
     
      
        <button  onmouseover="select(2)" onmouseout="deselect(2)" id="bt2" onclick="location.href = '2d.html';" class = "btns" style=" font-size: 1730%; margin-left: 5%; background-image: url(ak.png)"> llll </button>      
    

        <button  onmouseover="select(3)" onmouseout="deselect(3)" id="bt3" onclick="location.href = 'pn.html';" class = "btns" style=" font-size: 1500%; margin-left: 5%; background-image: url(360pn.png)"> llll </button>


        <button  onmouseover="select(4)" onmouseout="deselect(4)" id="bt4" onclick="location.href = 'obj.html';" class = "btns" style=" font-size: 1500%; margin-left: 5%; background-image: url(3d-obj.png)"> llll </button>


        </section>



         <br>
         
      
        
         <section style = "margin-top:0%;">
         
          <button id="t1" class = "txts" style="margin-left: 1%"> 3D Renders </button>    
    
          <button id="t2" class = "txts"> 2D Sketches </button>    

          <button id="t3" class = "txts"> 360 Panoramas </button>    

          <button id="t4" class = "txts"> 3D Objects </button>    


    
         </section>
       
       

    <script>    


          function select(id) 
          {           
              document.getElementById("bt" + id).style.backgroundSize = "100%";  
              document.getElementById("t" + id).style.color = "grey";        
          } 
          
         
          function deselect(id) 
          {      
             document.getElementById("bt" + id).style.backgroundSize = "90%";     
             document.getElementById("t" + id).style.color = "transparent";   
          }  
          
          
           
        

      
          window.setInterval(adjust_size, 100);  // refresh page size
          
          function adjust_size() 
          {  

           var w = window.outerWidth;
  
           if (w > 1700) {
            
              document.getElementById("btns").className = "btns_1920";
              document.getElementById("t1").style.marginLeft = "20.4%";
              document.getElementById("t2").style.marginLeft = "8%";
              document.getElementById("t3").style.marginLeft = "7%";
              document.getElementById("t4").style.marginLeft = "6.5%";


 
               
           } else if (w > 0 && w < 1400 ) 
           {
              
              document.getElementById("btns").className = "btns_1366";
              document.getElementById("t1").style.marginLeft = "8.6%";
              document.getElementById("t2").style.marginLeft = "11.7%";
              document.getElementById("t3").style.marginLeft = "7.9%";
              document.getElementById("t4").style.marginLeft = "7.7%";
    
           }
  
          }
      

      </script>
          
    
</body>


</html>
